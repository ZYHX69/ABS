<!DOCTYPE html>
<html>
<head>
    <title>Dashboard - Salon System</title>
    <link rel="stylesheet" href="css/style.css">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body>
    <div class="header">
        <h1>Salon Dashboard</h1>
        <div>Welcome, <span id="username"></span> (<span id="role"></span>)</div>
        <a href="php/logout.php">Logout</a>
    </div>

    <div class="insights">
        <div class="card">
            <h3>Clients</h3>
            <p id="clientCount">0</p>
        </div>
        <div class="card">
            <h3>Appointments</h3>
            <p id="appointmentCount">0</p>
        </div>
        <div class="card">
            <h3>Activity Feed</h3>
            <ul id="activityFeed"></ul>
        </div>
        <div class="card">
            <h3>Appointments per Day</h3>
            <canvas id="appointmentsChart"></canvas>
        </div>
    </div>

    <div class="modules">
        <div class="module">
            <h2>Clients</h2>
            <button id="addClientBtn">Add Client</button>
            <table id="clientsTable">
                <thead><tr><th>ID</th><th>Name</th><th>Email</th><th>Phone</th><th>Actions</th></tr></thead>
                <tbody></tbody>
            </table>
        </div>
        <div class="module">
            <h2>Appointments</h2>
            <button id="addAppointmentBtn">Add Appointment</button>
            <table id="appointmentsTable">
                <thead><tr><th>ID</th><th>Client</th><th>Service</th><th>Date</th><th>Time</th><th>Status</th><th>Actions</th></tr></thead>
                <tbody></tbody>
            </table>
        </div>
    </div>

    <div id="clientModal" class="modal">
        <div class="modal-content">
            <span class="close">&times;</span>
            <h3>Client</h3>
            <form id="clientForm">
                <input type="hidden" id="clientId">
                <input type="text" id="clientName" placeholder="Name" required>
                <input type="email" id="clientEmail" placeholder="Email" required>
                <input type="text" id="clientPhone" placeholder="Phone">
                <button type="submit">Save</button>
            </form>
        </div>
    </div>

    <div id="appointmentModal" class="modal">
        <div class="modal-content">
            <span class="close">&times;</span>
            <h3>Appointment</h3>
            <form id="appointmentForm">
                <input type="hidden" id="appointmentId">
                <select id="appointmentClientId" required>
                    <option value="">Select Client</option>
                </select>
                <input type="text" id="appointmentService" placeholder="Service" required>
                <input type="date" id="appointmentDate" required>
                <input type="time" id="appointmentTime" required>
                <select id="appointmentStatus">
                    <option value="scheduled">Scheduled</option>
                    <option value="completed">Completed</option>
                    <option value="cancelled">Cancelled</option>
                </select>
                <button type="submit">Save</button>
            </form>
        </div>
    </div>

    <script src="js/app.js"></script>
    <script src="js/chart.js"></script>
</body>
</html>
