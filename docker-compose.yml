services:
  web:
    build: .
    ports:
      - "80:80"
      - "8080:8080"
    depends_on:
      - db
    volumes:
      - .:/var/www/html
  db:
    image: mysql:8.0
    environment:
      MYSQL_ROOT_PASSWORD: rootpassword
      MYSQL_DATABASE: salon
    ports:
      - "3306:3306"
    volumes:
      - ./db_dump.sql:/docker-entrypoint-initdb.d/db_dump.sql